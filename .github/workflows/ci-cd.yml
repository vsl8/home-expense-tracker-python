name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

# Required permissions for the workflow
permissions:
  contents: read
  packages: write
  checks: write
  pull-requests: write
  actions: read
  security-events: write

env:
  PYTHON_VERSION: '3.11'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================
  # Job 1: Lint Python Code
  # ===========================================
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-
      
      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pylint black
      
      - name: Run flake8
        run: |
          flake8 app tests --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app tests --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics
      
      - name: Run pylint
        run: |
          pylint app --exit-zero --output-format=colorized --reports=y
        continue-on-error: true
      
      - name: Check code formatting with black
        run: |
          black --check --diff app tests
        continue-on-error: true

  # ===========================================
  # Job 2: Run Tests with Coverage
  # ===========================================
  test:
    name: Run Tests & Coverage
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Required for SonarQube
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-test-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:htmlcov \
            --cov-report=term-missing \
            --junitxml=test-results.xml \
            --html=test-report.html \
            --self-contained-html \
            -v
      
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results.xml
            test-report.html
      
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results.xml
          comment_mode: 'off'
          check_name: 'Test Results'

  # ===========================================
  # Job 3: SonarQube Analysis
  # ===========================================
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
      
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          #SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ github.repository_owner }}_${{ github.event.repository.name }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=app
            -Dsonar.tests=tests
        continue-on-error: true
      
      - name: SonarQube Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  # ===========================================
  # Job 4: Build Docker Image
  # ===========================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
      
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
      
      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'
        continue-on-error: true
      
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ===========================================
  # Job 5: Deploy to DEV
  # ===========================================
  deploy-dev:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    environment:
      name: dev
      url: https://dev.expense-tracker.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Deploy to DEV environment
        run: |
          echo "🚀 Deploying to DEV environment..."
          echo "Docker Image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          # Add your deployment commands here
          # Examples for different platforms:
          #
          # Azure Container Apps:
          # az containerapp update --name expense-tracker-dev \
          #   --resource-group rg-dev \
          #   --image ghcr.io/${{ github.repository }}:${{ github.sha }}
          #
          # AWS ECS:
          # aws ecs update-service --cluster dev-cluster \
          #   --service expense-tracker \
          #   --force-new-deployment
          #
          # Kubernetes:
          # kubectl set image deployment/expense-tracker \
          #   expense-tracker=ghcr.io/${{ github.repository }}:${{ github.sha }} \
          #   -n dev
          #
          # Docker on remote server:
          # ssh ${{ secrets.DEV_HOST }} "docker pull ghcr.io/${{ github.repository }}:${{ github.sha }} && \
          #   docker-compose up -d"
          echo "✅ DEV deployment completed!"

  # ===========================================
  # Job 6: Deploy to QA
  # ===========================================
  deploy-qa:
    name: Deploy to QA
    runs-on: ubuntu-latest
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    environment:
      name: qa
      url: https://qa.expense-tracker.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Deploy to QA environment
        run: |
          echo "🚀 Deploying to QA environment..."
          echo "Docker Image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          # Add your QA deployment commands here
          echo "✅ QA deployment completed!"

  # ===========================================
  # Job 7: Deploy to PROD (Requires Approval)
  # ===========================================
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: deploy-qa
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://expense-tracker.example.com
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Deploy to PROD environment
        run: |
          echo "🚀 Deploying to PRODUCTION environment..."
          echo "Docker Image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          # Add your production deployment commands here
          # Ensure you have proper rollback mechanisms
          #
          # Example: Tag as production-stable
          # docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
          # docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} \
          #   ghcr.io/${{ github.repository }}:production-stable
          # docker push ghcr.io/${{ github.repository }}:production-stable
          echo "✅ PRODUCTION deployment completed!"
      
      - name: Notify deployment success
        run: |
          echo "📧 Sending deployment notification..."
          echo "Version ${{ github.sha }} has been deployed to production"
          echo "Image: ghcr.io/${{ github.repository }}:${{ github.sha }}"
