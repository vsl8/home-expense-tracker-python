# SonarQube Project Configuration
# https://docs.sonarqube.org/latest/analysis/scan/sonarscanner/

# Project identification
sonar.projectKey=home-expense-tracker
sonar.projectName=Home Expense Tracker
sonar.projectVersion=1.0.0

# Source code settings
sonar.sources=app
sonar.tests=tests

# Python specific settings
sonar.python.version=3.11
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.xunit.reportPath=test-results.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/migrations/**,**/static/**,**/__pycache__/**,*.pyc
sonar.test.exclusions=**/tests/**

# Coverage exclusions
sonar.coverage.exclusions=**/tests/**,**/migrations/**,**/__init__.py

# Duplicate code detection
sonar.cpd.exclusions=**/tests/**

# Issue exclusions
# sonar.issue.ignore.multicriteria=e1
# sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1192
# sonar.issue.ignore.multicriteria.e1.resourceKey=**/*.py

# Quality Gate
# The project must have at least 80% code coverage
# and no critical or blocker issues

# Additional analysis parameters
sonar.python.pylint.reportPaths=pylint-report.txt
